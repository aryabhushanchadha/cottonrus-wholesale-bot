databases:
  - name: cottonrus-db
    plan: free
    databaseName: tshirts_wholesale
    user: tshirts

services:
  - type: web
    name: cottonrus-bot
    runtime: node
    plan: free
    region: oregon
    buildCommand: >-
      cd frontend && npm install && VITE_API_URL=/api npm run build &&
      cd ../backend && npm install && npm run build &&
      npx prisma migrate deploy && npx tsx prisma/seed.ts
    startCommand: cd backend && npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cottonrus-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_SECRET_KEY
        sync: false
      - key: ADMIN_API_KEY
        generateValue: true
      - key: COMPANY_NAME
        value: "Premium Cotton Wholesale Ltd."
      - key: COMPANY_ADDRESS
        value: "Moscow, Russia"
      - key: COMPANY_EMAIL
        value: "sales@cottonrus.example"
      - key: COMPANY_INN
        value: ""
