version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tshirts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tshirts
      POSTGRES_PASSWORD: tshirts
      POSTGRES_DB: tshirts_wholesale
    ports:
      - "5432:5432"
    volumes:
      - tshirts_pgdata:/var/lib/postgresql/data

volumes:
  tshirts_pgdata:
